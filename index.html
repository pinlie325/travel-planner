<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0f6e6b" />
<title>行程趣</title>
<style>
:root{
  --bg1:#f4f0e8; --bg2:#e9e2d5;
  --sand:#f5f1ea; --card:#fffefb; --ink:#1c2725; --muted:#7c8a86;
  --line:#e8e1d3; --line2:#f0ebe0;
  --sea:#0e7d78; --sea-d:#0a5c58; --sea-dd:#073f3d;
  --coral:#e0655c; --coral-d:#c8504a;
  --amber:#bf842a; --pos:#10916a;
  --tint:#e9f3f1;
  --sh-sm:0 1px 2px rgba(20,40,38,.05);
  --sh:0 3px 14px rgba(15,70,66,.07),0 1px 3px rgba(20,40,38,.04);
  --sh-lg:0 12px 38px rgba(12,60,56,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100vh;
}
.app,.gate{max-width:480px;margin:0 auto;min-height:100vh;background:transparent}
button{cursor:pointer;font-family:inherit;transition:transform .08s ease,box-shadow .18s ease,background .18s ease,opacity .15s ease}
button:active{transform:translateY(1px)}

/* --- header --- */
.hdr{position:sticky;top:0;z-index:5;color:#fff;padding:20px 18px 18px;
  background:
    radial-gradient(120% 140% at 88% -10%,rgba(255,255,255,.16),transparent 55%),
    linear-gradient(135deg,var(--sea) 0%,var(--sea-d) 70%,var(--sea-dd) 100%);
  border-radius:0 0 26px 26px;box-shadow:0 10px 28px rgba(10,70,66,.22)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hdr-name{font-size:22px;font-weight:800;letter-spacing:.6px;line-height:1.15}
.hdr-sub{font-size:12px;opacity:.82;margin-top:4px;letter-spacing:.3px}
.hdr-sub b{letter-spacing:1.5px;font-weight:700}
.hdr-btns{display:flex;gap:8px;flex-shrink:0}
.leave{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;
  padding:8px 14px;border-radius:22px;font-size:13px;font-weight:600;backdrop-filter:blur(6px)}
.leave:active{background:rgba(255,255,255,.28)}
.hdr-dates{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.16);
  font-size:13px;opacity:.9;letter-spacing:.4px;display:flex;align-items:center;gap:8px}
.hdr-dates .icon{font-size:16px}

/* --- body --- */
.body{padding:16px 14px 110px}

/* --- gate --- */
.gate{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px 22px}
.gate-card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:34px 26px;width:100%;box-shadow:var(--sh-lg)}
.logo{font-size:36px;font-weight:900;text-align:center;letter-spacing:3px;
  background:linear-gradient(135deg,var(--sea),var(--sea-dd));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tagline{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 26px;letter-spacing:.5px}

/* --- inputs --- */
.inp{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:12px 14px;
  font-size:16px;color:var(--ink);margin-bottom:10px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.inp:focus{outline:none;border-color:var(--sea);box-shadow:0 0 0 3px rgba(14,125,120,.13)}
.inp.big{font-size:22px;text-align:center;letter-spacing:4px;font-weight:800}
.lbl{display:block;font-size:13px;font-weight:800;color:var(--muted);margin:8px 2px 9px;letter-spacing:.3px}
.err{color:var(--coral-d);font-size:13px;margin-bottom:8px;font-weight:600}

/* --- buttons --- */
.btn{width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;margin-bottom:11px;font-family:inherit;letter-spacing:.5px}
.btn.primary{background:linear-gradient(135deg,var(--sea),var(--sea-d));color:#fff;box-shadow:0 6px 18px rgba(12,90,86,.28)}
.btn.ghost{background:#fff;color:var(--sea);border:1.5px solid var(--line)}
.btn.ghost:active{background:var(--tint)}
.btn.danger{background:#fdeceb;color:var(--coral-d);border:1.5px solid #f3c3c0;box-shadow:none}
.btn.sm{width:auto;padding:10px 18px;font-size:14px;margin:0}

/* --- segmented --- */
.seg{display:flex;gap:6px;background:#efe9dc;padding:5px;border-radius:14px;margin-bottom:6px}
.seg-btn{flex:1;border:none;background:transparent;padding:9px;border-radius:10px;font-size:14px;font-weight:700;color:var(--muted);font-family:inherit}
.seg-btn.on{background:#fff;color:var(--sea);box-shadow:0 2px 6px rgba(0,0,0,.09)}

/* --- day section --- */
.day-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.day-label{font-size:13px;font-weight:800;color:var(--sea-d);letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.day-date{font-size:12px;color:var(--muted);font-weight:600}
.add-spot-btn{background:var(--tint);border:1.5px dashed rgba(14,125,120,.35);color:var(--sea);
  border-radius:14px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:10px;font-family:inherit}
.add-spot-btn:active{background:#d5ebe8}

/* --- spot card --- */
.spot{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:14px 15px;
  margin-bottom:9px;box-shadow:var(--sh-sm);display:flex;gap:13px;align-items:flex-start}
.spot-left{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.spot-ic{width:42px;height:42px;border-radius:13px;background:var(--tint);
  display:flex;align-items:center;justify-content:center;font-size:20px}
.spot-time{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.3px;white-space:nowrap}
.spot-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.spot-name{font-weight:700;font-size:15px;letter-spacing:.2px}
.spot-note{font-size:12px;color:var(--muted);line-height:1.5}
.spot-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;
  color:#fff;margin-top:2px}
.spot-del{background:none;border:none;color:var(--coral-d);font-size:18px;padding:4px;flex-shrink:0;opacity:.6}
.spot-del:active{opacity:1}

/* --- empty --- */
.empty{text-align:center;color:var(--muted);padding:60px 24px;line-height:2;font-size:14px}
.empty-ic{font-size:44px;margin-bottom:12px;opacity:.7}

/* --- fab --- */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:82px;z-index:6;max-width:430px;
  color:#fff;border:none;padding:14px 30px;border-radius:30px;font-size:16px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(135deg,var(--coral),var(--coral-d));box-shadow:0 8px 22px rgba(200,80,74,.42)}
.fab:active{transform:translateX(-50%) translateY(1px)}

/* --- bottom bar --- */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:6;
  background:rgba(255,254,251,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:12px 18px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px}

/* --- sheet --- */
.sheet-wrap{position:fixed;inset:0;background:rgba(16,26,25,.5);z-index:20;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.sheet{background:var(--sand);width:100%;max-width:480px;border-radius:28px 28px 0 0;padding:8px 18px 32px;max-height:90vh;overflow-y:auto;
  animation:up .28s cubic-bezier(.2,.8,.2,1);box-shadow:0 -10px 40px rgba(0,0,0,.2)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grip{width:42px;height:5px;background:#d8d0bf;border-radius:3px;margin:8px auto 14px}
.sheet-h{display:flex;justify-content:space-between;align-items:center;font-size:19px;font-weight:800;margin-bottom:16px;letter-spacing:.3px}
.close-btn{background:rgba(0,0,0,.07);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;display:flex;align-items:center;justify-content:center}

/* --- categories grid --- */
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.cat{border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:11px 4px;font-size:12px;font-weight:700;
  color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit}
.cat span{font-size:21px}
.cat.on{border-color:var(--sea);background:var(--tint);color:var(--sea-d);box-shadow:inset 0 0 0 1px var(--sea)}

/* --- modal --- */
.modal-wrap{position:fixed;inset:0;background:rgba(16,26,25,.55);z-index:30;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
.modal{background:var(--card);border-radius:24px;padding:28px 22px;width:100%;max-width:400px;box-shadow:var(--sh-lg);animation:pop .22s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:20px;font-weight:800;margin-bottom:8px;text-align:center}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px;text-align:center;line-height:1.7}
.modal-code{font-size:36px;font-weight:900;text-align:center;letter-spacing:8px;color:var(--sea-d);margin:16px 0;
  background:var(--tint);border-radius:16px;padding:16px}

/* --- toast --- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(28,39,37,.92);color:#fff;padding:11px 22px;border-radius:22px;
  font-size:14px;font-weight:600;white-space:nowrap;pointer-events:none;
  animation:fadein .2s ease;letter-spacing:.3px}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* --- chip share --- */
.code-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 14px;
  font-size:13px;font-weight:700;color:#fff;cursor:pointer;backdrop-filter:blur(4px)}
.code-chip:active{background:rgba(255,255,255,.32)}
</style>
</head>
<body>
<div id="root"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwHUQw1fmW_mCXwMEe2tM8SolZMBz-mzZMHr1F4iCxk-zQ4qfVia_Dm0udE8oj02dj5XQ/exec';

const SPOT_CATS = [
  {id:'food',   label:'餐飲',   icon:'🍜', color:'#e0894a'},
  {id:'stay',   label:'住宿',   icon:'🏨', color:'#3f9fb0'},
  {id:'go',     label:'交通',   icon:'🚌', color:'#6aa84f'},
  {id:'sight',  label:'景點',   icon:'⛩️',  color:'#9b6dd4'},
  {id:'shop',   label:'購物',   icon:'🛍️', color:'#d9a441'},
  {id:'other',  label:'其他',   icon:'💡', color:'#8a8f98'},
];
const catOf = id => SPOT_CATS.find(c=>c.id===id) || SPOT_CATS[5];
const uid   = () => Math.random().toString(36).slice(2,9);
const esc   = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---- state ---- */
let plan = null, code = null;
let gateMode = 'home'; // home | create | join
let gateErr = '';
let sheetOpen = false, sheetDay = null, sheetEditing = null;
let pollingTimer = null;

/* ---- api ---- */
async function apiLoad(c){
  const r = await fetch(API_URL+'?code=PLAN_'+c);
  const d = await r.json();
  return d.trip;
}
async function apiSave(p){
  await fetch(API_URL,{method:'POST',body:JSON.stringify(p)});
}

async function save(next){
  if(!plan) return;
  await apiSave(plan);
  if(next) next();
}

/* ---- poll ---- */
function startPoll(){
  stopPoll();
  pollingTimer = setInterval(async()=>{
    if(!code) return;
    const fresh = await apiLoad(code);
    if(fresh) { plan = fresh; render(); }
  }, 15000);
}
function stopPoll(){ clearInterval(pollingTimer); }

/* ---- helpers ---- */
function toast(msg){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

function copyText(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('已複製！')).catch(()=>fallbackCopy(t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');
  ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('已複製！'); } catch(e){ toast('複製失敗'); }
  document.body.removeChild(ta);
}

function newPlan(c, name, startDate, days){
  return {
    code: 'PLAN_'+c,
    name, startDate,
    days: Array.from({length:days},(_,i)=>({id:uid(), dayIndex:i, spots:[]})),
    createdAt: Date.now()
  };
}

function dayDate(startDate, idx){
  if(!startDate) return null;
  const d = new Date(startDate);
  d.setDate(d.getDate()+idx);
  return d.toLocaleDateString('zh-Hant',{month:'numeric',day:'numeric',weekday:'short'});
}

/* ======================== RENDER ======================== */
function render(){
  const root = document.getElementById('root');
  if(!plan){
    root.innerHTML = gateHTML();
    bindGate();
  } else {
    root.innerHTML = appHTML();
    bindApp();
  }
  if(document.getElementById('sheet-container').innerHTML){
    // re-render sheet if open
  }
}

/* ---- gate ---- */
function gateHTML(){
  if(gateMode==='create') return createHTML();
  if(gateMode==='join')   return joinHTML();
  return homeHTML();
}

function homeHTML(){
  return `
  <div class="gate">
    <div class="gate-card">
      <div class="logo">行程趣</div>
      <div class="tagline">一起規劃、一起出發 ✈️</div>
      ${gateErr?`<div class="err">${esc(gateErr)}</div>`:''}
      <button class="btn primary" id="btn-create">＋ 建立新行程</button>
      <button class="btn ghost" id="btn-join">輸入代碼加入行程</button>
    </div>
  </div>`;
}

function createHTML(){
  return `
  <div class="gate">
    <div class="gate-card">
      <div class="logo" style="font-size:24px;margin-bottom:4px">建立行程</div>
      <div class="tagline" style="margin-bottom:20px">填寫旅程基本資訊</div>
      ${gateErr?`<div class="err">${esc(gateErr)}</div>`:''}
      <label class="lbl">行程名稱</label>
      <input class="inp" id="g-name" placeholder="例：馬來西亞五天四夜" maxlength="40" />
      <label class="lbl">出發日期（選填）</label>
      <input class="inp" id="g-date" type="date" />
      <label class="lbl">共幾天</label>
      <input class="inp" id="g-days" type="number" min="1" max="30" value="4" />
      <button class="btn primary" id="btn-do-create">建立行程</button>
      <button class="btn ghost" id="btn-back">← 返回</button>
    </div>
  </div>`;
}

function joinHTML(){
  return `
  <div class="gate">
    <div class="gate-card">
      <div class="logo" style="font-size:24px;margin-bottom:4px">加入行程</div>
      <div class="tagline" style="margin-bottom:20px">輸入朋友分享的代碼</div>
      ${gateErr?`<div class="err">${esc(gateErr)}</div>`:''}
      <input class="inp big" id="g-code" placeholder="ABCD" maxlength="6" autocapitalize="characters" />
      <button class="btn primary" id="btn-do-join">加入</button>
      <button class="btn ghost" id="btn-back">← 返回</button>
    </div>
  </div>`;
}

/* ---- app ---- */
function appHTML(){
  const c = plan.code.replace('PLAN_','');
  const dateInfo = plan.startDate
    ? `${plan.startDate.replace(/-/g,'/')} 出發`
    : `共 ${plan.days.length} 天`;

  const daysHTML = plan.days.map((day,i)=>{
    const dd = dayDate(plan.startDate, i);
    const spotsHTML = day.spots.length===0
      ? `<div style="font-size:13px;color:var(--muted);text-align:center;padding:10px 0 6px;opacity:.7">尚無行程，點下方新增</div>`
      : day.spots.map(s=>spotCardHTML(s,i)).join('');
    return `
    <div class="day-hdr">
      <div class="day-label">
        <span>DAY ${i+1}</span>
        ${dd?`<span class="day-date">${dd}</span>`:''}
      </div>
    </div>
    ${spotsHTML}
    <button class="add-spot-btn" data-day="${i}">＋ 新增景點</button>`;
  }).join('');

  return `
  <div class="app">
    <div class="hdr">
      <div class="hdr-row">
        <div>
          <div class="hdr-name">${esc(plan.name)}</div>
          <div class="hdr-sub">${dateInfo}</div>
        </div>
        <div class="hdr-btns">
          <button class="code-chip" id="btn-share">📋 ${c}</button>
          <button class="leave" id="btn-leave">離開</button>
        </div>
      </div>
    </div>
    <div class="body">${daysHTML}</div>
  </div>
  <div id="sheet-container"></div>`;
}

function spotCardHTML(s, dayIdx){
  const cat = catOf(s.cat);
  return `
  <div class="spot" data-sid="${esc(s.id)}" data-day="${dayIdx}">
    <div class="spot-left">
      <div class="spot-ic">${cat.icon}</div>
      ${s.time?`<div class="spot-time">${esc(s.time)}</div>`:''}
    </div>
    <div class="spot-mid">
      <div class="spot-name">${esc(s.name||'（未命名）')}</div>
      ${s.note?`<div class="spot-note">${esc(s.note)}</div>`:''}
      <div><span class="spot-tag" style="background:${cat.color}">${cat.label}</span></div>
    </div>
    <button class="spot-del" data-sid="${esc(s.id)}" data-day="${dayIdx}" title="刪除">✕</button>
  </div>`;
}

/* ======================== BIND ======================== */
function bindGate(){
  const q = id => document.getElementById(id);
  if(gateMode==='home'){
    q('btn-create').onclick=()=>{ gateMode='create'; gateErr=''; render(); };
    q('btn-join').onclick=()=>{ gateMode='join'; gateErr=''; render(); };
  } else if(gateMode==='create'){
    q('btn-back').onclick=()=>{ gateMode='home'; gateErr=''; render(); };
    q('btn-do-create').onclick=async()=>{
      const name = q('g-name').value.trim();
      const date = q('g-date').value;
      const days = parseInt(q('g-days').value)||4;
      if(!name){ gateErr='請輸入行程名稱'; render(); return; }
      if(days<1||days>30){ gateErr='天數請填 1～30'; render(); return; }
      const c = Math.random().toString(36).slice(2,6).toUpperCase();
      plan = newPlan(c, name, date||null, days);
      await apiSave(plan);
      code = c;
      gateMode='home'; gateErr='';
      showCodeModal(c);
      startPoll();
      render();
    };
  } else if(gateMode==='join'){
    const inp = q('g-code');
    if(inp) inp.addEventListener('input',()=>{ inp.value=inp.value.toUpperCase(); });
    q('btn-back').onclick=()=>{ gateMode='home'; gateErr=''; render(); };
    q('btn-do-join').onclick=async()=>{
      const c = (q('g-code').value||'').trim().toUpperCase();
      if(!c){ gateErr='請輸入代碼'; render(); return; }
      const p = await apiLoad(c);
      if(!p){ gateErr='找不到行程，請確認代碼'; render(); return; }
      plan = p; code = c;
      gateMode='home'; gateErr='';
      startPoll();
      render();
    };
  }
}

function bindApp(){
  document.getElementById('btn-leave').onclick=()=>{
    if(confirm('離開行程？（代碼仍可再次加入）')){
      plan=null; code=null; stopPoll(); render();
    }
  };
  document.getElementById('btn-share').onclick=()=>{
    const c = plan.code.replace('PLAN_','');
    copyText(c);
  };

  // add spot buttons
  document.querySelectorAll('.add-spot-btn').forEach(btn=>{
    btn.onclick=()=>openSheet(parseInt(btn.dataset.day), null);
  });

  // spot click to edit
  document.querySelectorAll('.spot').forEach(el=>{
    el.onclick=(e)=>{
      if(e.target.classList.contains('spot-del')) return;
      const dayIdx = parseInt(el.dataset.day);
      const sid = el.dataset.sid;
      openSheet(dayIdx, sid);
    };
  });

  // delete spot
  document.querySelectorAll('.spot-del').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const dayIdx = parseInt(btn.dataset.day);
      const sid = btn.dataset.sid;
      if(!confirm('刪除此景點？')) return;
      plan.days[dayIdx].spots = plan.days[dayIdx].spots.filter(s=>s.id!==sid);
      save(()=>{ toast('已刪除'); render(); });
    };
  });
}

/* ======================== SHEET ======================== */
function openSheet(dayIdx, sid){
  sheetOpen=true; sheetDay=dayIdx;
  sheetEditing = sid ? plan.days[dayIdx].spots.find(s=>s.id===sid) : null;
  const sc = document.getElementById('sheet-container');
  sc.innerHTML = sheetHTML();
  bindSheet();
}

function closeSheet(){
  sheetOpen=false; sheetDay=null; sheetEditing=null;
  document.getElementById('sheet-container').innerHTML='';
}

function sheetHTML(){
  const s = sheetEditing;
  const catsGrid = SPOT_CATS.map(c=>`
    <button class="cat${(s?s.cat:null)===c.id?' on':''}" data-cat="${c.id}">
      <span>${c.icon}</span>${c.label}
    </button>`).join('');

  return `
  <div class="sheet-wrap" id="sheet-wrap">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-h">
        <span>${s?'編輯景點':'新增景點'}</span>
        <button class="close-btn" id="sheet-close">✕</button>
      </div>
      <label class="lbl">景點名稱</label>
      <input class="inp" id="s-name" placeholder="例：雙峰塔" value="${esc(s?s.name:'')}" />
      <label class="lbl">時間（選填）</label>
      <input class="inp" id="s-time" placeholder="例：09:00" value="${esc(s?s.time:'')}" />
      <label class="lbl">類型</label>
      <div class="cats" id="cats-grid">${catsGrid}</div>
      <label class="lbl">備註（選填）</label>
      <textarea class="inp" id="s-note" rows="2" placeholder="地址、預訂資訊…" style="resize:none">${esc(s?s.note:'')}</textarea>
      <button class="btn primary" style="margin-top:8px" id="sheet-submit">${s?'儲存變更':'加入行程'}</button>
    </div>
  </div>`;
}

function bindSheet(){
  let selectedCat = sheetEditing ? sheetEditing.cat : 'sight';

  // cat grid
  document.querySelectorAll('#cats-grid .cat').forEach(btn=>{
    btn.onclick=()=>{
      selectedCat=btn.dataset.cat;
      document.querySelectorAll('#cats-grid .cat').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
    };
  });

  document.getElementById('sheet-close').onclick=closeSheet;
  document.getElementById('sheet-wrap').onclick=e=>{ if(e.target.id==='sheet-wrap') closeSheet(); };

  document.getElementById('sheet-submit').onclick=()=>{
    const name = document.getElementById('s-name').value.trim();
    const time = document.getElementById('s-time').value.trim();
    const note = document.getElementById('s-note').value.trim();
    if(!name){ toast('請填寫景點名稱'); return; }
    if(sheetEditing){
      sheetEditing.name=name; sheetEditing.time=time; sheetEditing.note=note; sheetEditing.cat=selectedCat;
    } else {
      plan.days[sheetDay].spots.push({id:uid(),name,time,note,cat:selectedCat});
    }
    save(()=>{ toast(sheetEditing?'已更新':'已加入'); closeSheet(); render(); });
  };
}

/* ======================== CODE MODAL ======================== */
function showCodeModal(c){
  const wrap = document.createElement('div');
  wrap.className='modal-wrap';
  wrap.innerHTML=`
    <div class="modal">
      <div class="modal-title">🎉 行程建立成功！</div>
      <div class="modal-sub">把代碼分享給旅伴，大家都能一起編輯行程。</div>
      <div class="modal-code">${c}</div>
      <button class="btn primary" id="mc-copy">複製代碼</button>
      <button class="btn ghost" id="mc-ok">開始規劃</button>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector('#mc-copy').onclick=()=>copyText(c);
  wrap.querySelector('#mc-ok').onclick=()=>wrap.remove();
}

/* ======================== INIT ======================== */
(function(){
  render();
})();
</script>
</body>
